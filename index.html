    <div class="encuesta-container">
        <h2>¿cual es tu proyectada?</h2>
        <!-- Botones de opciones con un contador interno -->
        <button class="opcion-btn" onclick="votar('fruta1')">
            <span>negro y blanco🇮🇱</span>
            <span class="votos-conteo" id="fruta1">0 votos</span>
        </button>

        <button class="opcion-btn" onclick="votar('fruta2')">
            <span>album del peyo🇮🇱</span>
            <span class="votos-conteo" id="fruta2">0 votos</span>
        </button>

        <button class="opcion-btn" onclick="votar('fruta3')">
            <span>benjamin🇮🇱</span>
            <span class="votos-conteo" id="fruta3">0 votos</span>
        </button>

        <button class="option-btn" onclick="votar('fruta4')">
            <span>ringo anemia🏳️‍🌈</span>
            <span class="votos-conteo" id="fruta4">0 votos</span>
        </button>
    </div>    
<script>
        // Objeto para almacenar los votos en la memoria del navegador
        const votos = {
            fruta1: 0,
            fruta2: 0,
            fruta3: 0,
            fruta4: 0
        };

        function votar(idOpcion) {
            // 1. Sumar un voto a la opción seleccionada
            votos[idOpcion]++;
            
            // 2. Actualizar el texto del botón en la pantalla
            document.getElementById(idOpcion).innerText = votos[idOpcion] + " votos";
            
            // 3. Determinar cuál es el número de votos más alto
            let maxVotos = Math.max(votos.fruta1, votos.fruta2, votos.fruta3, votos.fruta4);
            
            // 4. Buscar qué opción tiene más votos y pintarla de verde oscuro
            // Primero quitamos la clase 'ganador' de todos los botones
            document.querySelectorAll('.opcion-btn').forEach(btn => btn.classList.remove('ganador'));
            
            // Si la opción tiene el puntaje máximo, le añadimos el estilo visual de ganador
            if (votos.fruta1 === maxVotos) document.getElementById('fruta1').parentElement.classList.add('ganador');
            if (votos.fruta2 === maxVotos) document.getElementById('fruta2').parentElement.classList.add('ganador');
            if (votos.fruta3 === maxVotos) document.getElementById('fruta3').parentElement.classList.add('ganador');
            if (votos.fruta4 === maxVotos) document.getElementById('fruta4').parentElement.classList.add('ganador');
        }
    </script>
